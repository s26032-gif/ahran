    <title>고양이가좋아</title>

<body>
<h2>저는 동물을 좋아합니다<br>그런데 그중에 고양이를 특히 좋아해요</h2>
<hr>
어떤 동물을 좋아하는지 말해줄게요<br>
<ul>
<li>개</li>
<li>돌고래</li>
<li>참새</li>
<li>까치</li>
<li>고양이</li>
<ol>
<li><b><ins>랙돌</ins></b></li>
<li>샴</li>
<li><b>라가머핀</b></li>
<li>러시안블루</li>
<li><mark><b>노르웨이숲</b></mark></li>
<li><del>호랑이도 고양이 아닌가</del></li>
</ol>
<li>족제비</li>
<li>고슴도치</li>
</ul>
<hr>
여러분도 고양이를 좋아하시나요?
</body>
</html>
